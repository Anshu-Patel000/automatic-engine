openapi: 3.0.3
info:
  title: Orders Demo API
  version: 1.1.0
paths:
  /Orders/{orderId}:
    get:
      summary: Fetch one order
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: ok
    delete:
      summary: Delete one order
      responses:
        '204':
          description: deleted
  /Orders:
    post:
      summary: Create order
      responses:
        '201':
          description: created
